services:
  php:
    build:
      context: ./php
      args:
        PHP_VERSION: ${PHP_VERSION}
    env_file:
      - .env
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE}
    volumes:
      - ../src:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/99-overrides.ini:ro
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || php -r 'echo \"ok\";'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  nginx:
    build:
      context: ./nginx
    depends_on:
      php:
        condition: service_started
    volumes:
      - ../src:/var/www/html:ro
      - ./logs/nginx:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "${APP_PORT}:80"
    restart: unless-stopped
    networks:
      - app-network

  mysql:
    build:
      context: ./mysql
      args:
        MYSQL_VERSION: ${MYSQL_VERSION}
    profiles: ["mysql"]
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  postgres:
    build:
      context: ./postgres
      args:
        POSTGRES_VERSION: ${POSTGRES_VERSION}
    profiles: ["postgres"]
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  mongo:
    build:
      context: ./mongo
      args:
        MONGO_VERSION: ${MONGO_VERSION}
    profiles: ["mongo"]
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  redis:
    build:
      context: ./redis
      args:
        REDIS_VERSION: ${REDIS_VERSION}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  mysql_test:
    build:
      context: ./mysql
      args:
        MYSQL_VERSION: ${MYSQL_VERSION}
    profiles: ["mysql"]
    env_file:
      - .env
    volumes:
      - mysql_test_data:/var/lib/mysql
    ports:
      - "${MYSQL_TEST_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  postgres_test:
    build:
      context: ./postgres
      args:
        POSTGRES_VERSION: ${POSTGRES_VERSION}
    profiles: ["postgres"]
    env_file:
      - .env
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_TEST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  mongo_test:
    build:
      context: ./mongo
      args:
        MONGO_VERSION: ${MONGO_VERSION}
    profiles: ["mongo"]
    env_file:
      - .env
    volumes:
      - mongo_test_data:/data/db
    ports:
      - "${MONGO_TEST_PORT}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  adminer:
    image: adminer:4.8.1
    profiles: ["dev"]
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit
    profiles: ["dev"]
    ports:
      - "${PORT_MAIL_SMTP}:1025"
      - "${PORT_MAIL_HTTP}:8025"
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION}-management
    profiles: ["dev"]
    ports:
      - ${PORT_RABBITMQ_LISTENER}:5672
      - ${PORT_RABBITMQ_TCP_LISTENER}:5673
      - ${PORT_RABBITMQ_MANAGEMENT}:15672
    networks:
      - app-network

volumes:
  mysql_data:
  postgres_data:
  mongo_data:
  redis_data:
  mysql_test_data:
  postgres_test_data:
  mongo_test_data:

networks:
  app-network:
    driver: bridge
